name: Sync Wedding Data

on:
  schedule:
    - cron: "0 * * * *" # Hourly sync
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        id: sync_call
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: ${{ secrets.SYNC_URL }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SYNC_URL/api/cron/sync-wedding" || true)
          if [ ! -f response.json ]; then
            echo '{"ok":false,"message":"No response body"}' > response.json
          fi
          cat response.json
          echo "HTTP status: $code"
          test "$code" = "200"

      - name: Validate CPA coverage
        id: validate_cpa
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const response = JSON.parse(fs.readFileSync('response.json', 'utf8'));

          if (!response.ok) {
            console.error('Sync API returned failure payload.');
            process.exit(1);
          }

          const cpa = response.cpa ?? {};
          const cpaDrift = response.cpaDrift ?? {};
          const total = Number(cpa.total ?? 0);
          const withCpa = Number(cpa.withCpa ?? 0);
          const missing = Number(cpa.missing ?? 0);
          const sourceAdDataChanged = Number(cpaDrift.sourceAdDataChanged ?? 0);

          console.log(`CPA coverage: ${withCpa}/${total} (missing: ${missing})`);
          console.log(`CPA source drift: ${sourceAdDataChanged}`);

          if (missing > 0) {
            console.error('Detected missing CPA mappings.');
            if (Array.isArray(cpa.missingByRegion)) {
              for (const item of cpa.missingByRegion) {
                if ((item.missing ?? 0) > 0) {
                  console.error(`- ${item.region}: ${item.missing}/${item.total}`);
                }
              }
            }
            process.exit(2);
          }

          if (sourceAdDataChanged > 0) {
            console.error('Detected source-side CPA token changes.');
            if (Array.isArray(cpaDrift.changedEvents)) {
              for (const item of cpaDrift.changedEvents.slice(0, 20)) {
                console.error(`- ${item.title}: ${item.previousSourceAdData} -> ${item.currentSourceAdData}`);
              }
            }
            process.exit(3);
          }
          NODE

      - name: Notify alert webhook on failure
        if: failure() && secrets.CPA_ALERT_WEBHOOK_URL != ''
        env:
          CPA_ALERT_WEBHOOK_URL: ${{ secrets.CPA_ALERT_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ.get("CPA_ALERT_WEBHOOK_URL", "").strip()
          if not webhook:
              raise SystemExit(0)

          body = ""
          try:
              with open("response.json", "r", encoding="utf-8") as f:
                  body = f.read()
          except Exception:
              body = "{\"ok\":false,\"message\":\"No response.json\"}"

          message = "\n".join([
              "[Wedding Sync Alert] 자동 동기화에서 CPA 누락 또는 변경이 감지되었습니다.",
              f"workflow: {os.environ.get('GITHUB_WORKFLOW', '')}",
              f"run: https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}",
              "response:",
              body[:3500],
          ])

          payload = {"text": message}

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(req, timeout=10).read()
          PY

      - name: Create or update GitHub alert issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let responseBody = 'No response.json';
            try {
              responseBody = fs.readFileSync('response.json', 'utf8');
            } catch (error) {
              responseBody = `Failed to read response.json: ${error.message}`;
            }

            const title = '[Wedding Sync Alert] CPA drift or missing mapping detected';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '자동 웨딩 동기화에서 CPA 누락 또는 source-side 변경이 감지되었습니다.',
              '',
              `- Workflow: ${process.env.GITHUB_WORKFLOW}`,
              `- Run: ${runUrl}`,
              '',
              '```json',
              responseBody.slice(0, 6000),
              '```',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug'],
              });
            }
